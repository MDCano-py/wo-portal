# ──────────────────────────────────────────────
# Work Order Portal — add this inside your existing server { } block
# in /etc/nginx/sites-available/n8n (or wherever your n8n config lives)
# ──────────────────────────────────────────────

    # Work Order Portal - static files
    location /wo-portal {
        alias /var/www/wo-portal;
        index index.html;
        try_files $uri $uri/ /wo-portal/index.html;

        # CORS headers for n8n webhook calls
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";

        # Cache static assets
        location ~* \.(json)$ {
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin *;
        }
    }
