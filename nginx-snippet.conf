    # Paste inside your `server { ... }` (see deploy.sh for context).
    #
    # Microsoft Teams and Outlook host tabs in iframes. Browsers do not honor
    # `frame-ancestors` from a <meta> tag — the server must send a CSP header
    # (or omit blocking X-Frame-Options) or the page will be blank in Teams.
    # If the parent vhost still sets `X-Frame-Options: DENY` / `SAMEORIGIN` for
    # all routes, add an exception for /wo-portal/ or that header will still block.
    location /wo-portal {
        alias /var/www/wo-portal;
        index index.html;
        try_files $uri $uri/ /wo-portal/index.html;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
        # Embed in Microsoft Teams, Outlook, M365; keep your own site too.
        add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com https://*.msteams.microsoft.com https://*.office.com https://outlook.office.com https://*.cloud.microsoft" always;

        # Cache JSON; re-send CSP and CORS (nested location does not merge parent add_header in nginx)
        location ~* \.(json)$ {
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin *;
            add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com https://*.msteams.microsoft.com https://*.office.com https://outlook.office.com https://*.cloud.microsoft" always;
        }
    }
