<style>
:root {
  --bg: #0f0e0c;
  --bg2: #161412;
  --card: #1a1816;
  --line: rgba(255, 255, 255, 0.09);
  --text: #e8e4de;
  --muted: #8a847a;
  --faint: #4a4540;
  --focus: #6e8a9a;
  --ok: #7d9e86;
  --err: #c17a6a;
  --warn: #b89a5c;
  --r: 3px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;overflow-x:hidden}
body {
  background: var(--bg);
  background-image: linear-gradient(165deg, var(--bg2) 0%, var(--bg) 45%, #0c0b0a 100%);
  color: var(--text);
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  font-size: 16px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
input,textarea,select,button{font-family:inherit}
input:focus,textarea:focus{outline:none}
::placeholder{color: var(--faint)}

.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem 2.5rem}
.wrap{width:100%;max-width:420px}
.top-rule{height:2px;width:2.5rem;background: var(--warn);margin-bottom:1.25rem;opacity:.75}

h1 {
  font-family: Georgia, "Iowan Old Style", "Palatino Linotype", Palatino, serif;
  font-size: 1.5rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--text);
  line-height:1.2;
}
.org { font-size: .9rem; color: var(--muted); margin-top: .35rem; }

/* Embedded in Teams or another host iframe: no vertical centering, use height chain */
html.in-iframe, html.in-iframe body { min-height: 100%; }
.in-iframe .page {
  min-height: 100%;
  align-items: flex-start;
  padding-top: 0.5rem;
  padding-bottom: 1.5rem;
}
.in-iframe .card { margin-top: 0.9rem; }

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 1.35rem 1.2rem 1.2rem;
  box-shadow: 0 1px 0 rgba(255, 255, 255, 0.03) inset;
}

.field{margin-bottom:1.1rem;position:relative}
.label{display:block;font-size:.8rem;font-weight:600;color: var(--text); margin-bottom: .4rem; opacity: .9}
.hint { font-size: .72rem; color: var(--muted); font-weight: 400; margin-top: 0.2rem; }

.input-wrap {
  border: 1px solid var(--line);
  border-radius: var(--r);
  background: rgba(0, 0, 0, 0.15);
  transition: border-color .15s, box-shadow .15s;
  position: relative;
}
.input-wrap.focused { border-color: var(--focus); box-shadow: 0 0 0 1px var(--focus); }
.input-wrap.disabled{opacity:0.45;pointer-events:none}
.input-wrap input,.input-wrap textarea {
  width: 100%;
  padding: 0.55rem 0.7rem;
  font-size: 0.9rem;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
}
.input-wrap textarea{resize:vertical; line-height:1.5; min-height:5.5rem}

.clear-btn{position:absolute;right:.4rem;top:50%;transform:translateY(-50%);background:transparent;border:none;border-radius:2px;min-width:1.4rem;min-height:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;color: var(--muted);line-height:1;opacity: .85}
.clear-btn:hover { color: var(--text) }

.dropdown {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
  background: #1f1c19;
  border: 1px solid var(--line);
  border-radius: var(--r);
  margin-top: 2px; max-height: 200px; overflow-y: auto;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.dropdown.open{display:block}
.dropdown .item{padding: .45rem .7rem; cursor: pointer; font-size: 0.875rem; border-bottom: 1px solid rgba(255, 255, 255, 0.04) }
.dropdown .item:last-child{border-bottom:none}
.dropdown .item:hover{background: rgba(255, 255, 255, 0.05)}
.dropdown .item .name{color: var(--text); font-weight: 500}
.dropdown .item .tag{ margin-left: 0.35rem; font-size: 0.7rem; color: var(--muted) }

.priority-bar{display:flex;gap:5px;flex-wrap:wrap}
.priority-bar button{
  flex: 1 1 22%;
  min-width: 0;
  padding: .4rem .35rem;
  border-radius: 2px;
  border: 1px solid var(--line);
  background: rgba(0,0,0,.12);
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: color .1s, border-color .1s, background .1s;
  text-transform: none;
  letter-spacing: 0;
}
.priority-bar button:hover{ border-color: rgba(255, 255, 255, 0.14) }

.upload-zone {
  border: 1px dashed var(--line);
  border-radius: var(--r);
  padding: .8rem;
  text-align: left;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  background: rgba(0, 0, 0, 0.12);
}
.upload-zone:hover{ border-color: rgba(255, 255, 255, 0.15); background: rgba(0,0,0,.2) }
.upload-t { color: var(--text); font-size: .86rem; font-weight: 500; }
.upload-d { color: var(--muted); font-size: .75rem; margin-top: 0.25rem; }
.upload-preview{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.upload-thumb{position:relative;width:56px;height:56px;border-radius:2px;overflow:hidden;border:1px solid var(--line)}
.upload-thumb img{width:100%;height:100%;object-fit:cover}
.upload-thumb .rm{position:absolute;top:1px;right:1px;width:15px;height:15px;border-radius:1px;background: rgba(0,0,0,0.65);border: none;color: #ddd;font-size: .5rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

.summary .row strong{ font-weight: 600; color: var(--text) }
.summary .slbl{ color: var(--muted); font-size: 0.72rem; display: inline-block; min-width: 6.5ch; }
.summary .tag-b { color: var(--muted); font-size: 0.78rem; margin-left: 0.25rem }

.submit-btn.active{ background: #2a2824; color: #f0ebe4; border-color: rgba(255, 255, 255, 0.18); }
.submit-btn.active:hover{ background: #34312c }
.submit-btn.inactive{ background: transparent; color: var(--faint); border-color: rgba(255, 255, 255, 0.06); cursor: not-allowed; opacity: .7 }

#status-bar:empty{ display: none; height:0; min-height:0; margin:0; padding:0; border:none; overflow:hidden; }
.status-bar { padding: .5rem 0.65rem; border: 1px solid var(--line); border-radius: 2px; margin-bottom: 0.9rem; display: flex; justify-content: space-between; align-items: center; min-height: 2.3rem; animation: fadeIn .2s ease; gap: 0.6rem; }
.status-bar .btn{ background: transparent; border: 1px solid var(--line); cursor: pointer; font: inherit; font-size: 0.78rem; font-weight: 500; padding: 0.25rem 0.5rem; border-radius: 2px; text-transform: none; letter-spacing: 0; color: inherit }

@keyframes fadeIn{ from { opacity: 0 } to { opacity: 1 } }

<div class="page">
<div class="wrap">

<div>

</div>

<div class="card" style="margin-top:1.3rem">

  </div>

    </div>
    <div class="dropdown" id="asset-dropdown" role="listbox"></div>
  </div>

  <div class="field">
    <label class="label">How urgent is this?</label>

      <button type="button" data-p="LOW" data-c="#5a7368">Low</button>

    </div>

  <div class="footer">Goes to MaintainX through n8n.</div>
</div>

</div>
</div>

":"Powell 9 Ultra"},{"i":"4572655","n":"Falcon Ridge"},{"i":"4572656","n":"Elk"},{"i":"4572657","n":"Permian Resources"},{"i":"4572658","n":"Jade West"},{"i":"4572659","n":"Bridgestate"},{"i":"4572660","n":"Widow Jane"},{"i":"4572661","n":"Heaven Hill"},{"i":"4572662","n":"17 North"},{"i":"4572663","n":"Petro Hunt"},{"i":"4572664","n":"Pronghorn"},{"i":"4572665","n":"Cosmo"},{"i":"4572666","n":"Four Points"},{"i":"4572667","n":"Penner"},{"i":"4572668","n":"Hilcorp - Barker Creek"},{"i":"4572669","n":"Remote Support"},{"i":"4572670","n":"BKRF - BDR"},{"i":"4572671","n":"Streamline Innovations"},{"i":"4572672","n":"Odessa Warehouse"},{"i":"4572673","n":"I&E TRK 2947 | ALEXANDER"},{"i":"4572674","n":"MECH TRK 7965 | CORRAL"},{"i":"4572675","n":"I&E TRK 9922 | COUSSAN"},{"i":"4572676","n":"I&E TRK 4867 | THOMPSON"},{"i":"4572677","n":"I&E TRK 9408 | VACANT"},{"i":"4572678","n":"I&E TRK 9328 | BOWDEN"},{"i":"4572679","n":"MECH TRK 0666 | ZERANGUE"},{"i":"4572680","n":"I&E TRK 4929 | AVALOS"},{"i":"4572681","n":"I&E TRK 8429 | MONTOYA"},{"i":"4572682","n":"CNX | Widow Jane"},{"i":"4572683","n":"CNX | Talco"},{"i":"4572684","n":"CNX | Greenlight"},{"i":"4572685","n":"CNX | Bridgestate"},{"i":"4572686","n":"CNX | Powell"},{"i":"4572687","n":"VF Petroleum"},{"i":"4572688","n":"Cache River"},{"i":"4572689","n":"XTO Energy"},{"i":"4572690","n":"Rhaegal 1"},{"i":"4572691","n":"Rhaegal 2"},{"i":"4572692","n":"Scarlet 1"},{"i":"4572693","n":"Scarlet 2"},{"i":"4572694","n":"Patricia"},{"i":"4572695","n":"Mims"},{"i":"4667199","n":"Inactive Assets"},{"i":"4667202","n":"OWH - Muskie 5"}];

/**

 *
 * Your entries in tagToLocationName override built-in defaults for the same tag.
 */
const LOCATION_ASSET_LOOKUP = {

    // "EXAMPLE": "Chevron",
  },
  locationToTags: {

async function init() {
  LOCATIONS = EMBEDDED_LOCATIONS.map(l => ({ id: l.i, name: l.n }));

  try {
    let data;
    if (CONFIG.useLiveCache) {
      const res = await fetch(CONFIG.liveCacheUrl);
      data = await res.json();
      LOCATIONS = (data.locations || []).map(l => ({ id: l.id || l.i, name: l.name || l.n }));
      ASSETS = (data.assets || []).map(a => ({ id: a.id || a.i, name: a.name || a.n, locTag: a.locTag || a.t || "" }));
    } else {
      const res = await fetch(CONFIG.assetsUrl);
      const arr = await res.json();
      ASSETS = arr.map(a => ({ id: a.i, name: a.n, locTag: a.t || "" }));
    }
  } catch (e) {
    console.warn("Failed to load assets:", e);

  buildLocationAssetIndex();
  setupEventListeners();
}

function fuzzySearch(query, items, limit = 12) {
  if (!query || query.length < 1) return [];
  const q = query.toLowerCase();
  const results = [];
  for (const item of items) {
    const n = (item.name || "").toLowerCase();
    const t = (item.locTag || "").toLowerCase();
    let score = 0;
    if (n === q) score = 100;
    else if (n.startsWith(q)) score = 80;
    else if (n.includes(q)) score = 60;
    else if (t && t.startsWith(q)) score = 40;
    else if (t && t.includes(q)) score = 20;
    if (score > 0) results.push({ item, score });
  }
  results.sort((a, b) => b.score - a.score);
  return results.slice(0, limit).map(r => r.item);
}

function normalizeValue(value) {
  return String(value || "").trim().toLowerCase();
}

function alnum(value) {
  return normalizeValue(value).replace(/[^a-z0-9]/g, "");
}

function extractNumberTokens(value) {
  const matches = String(value || "").match(/[0-9]+(?:\.[0-9]+)?[a-z]?/gi);
  return matches || [];
}

function consonantSkeleton(value) {
  return alnum(value).replace(/[aeiou]/g, "");
}

function buildLocationAliases(locationName) {
  const raw = normalizeValue(locationName);
  const tokens = raw.split(/[^a-z0-9.]+/).filter(Boolean);
  const aliases = new Set();
  if (!raw) return aliases;

  aliases.add(raw);
  aliases.add(alnum(raw));

  const initials = tokens.map(t => t[0]).join("");
  if (initials) aliases.add(initials);

  const shortDirections = raw
    .replace(/\bnorth\b/g, "n")
    .replace(/\bsouth\b/g, "s")
    .replace(/\beast\b/g, "e")
    .replace(/\bwest\b/g, "w");
  aliases.add(alnum(shortDirections));

  const firstWord = (tokens[0] || "").replace(/[^a-z]/g, "");
  const firstWordCode = consonantSkeleton(firstWord).slice(0, 4) || firstWord.slice(0, 4);
  const numberTail = extractNumberTokens(raw).join("").replace(/[^a-z0-9]/g, "");
  if (firstWordCode) aliases.add(firstWordCode + numberTail);

  const skeleton = consonantSkeleton(raw);
  if (skeleton) aliases.add(skeleton);

  return aliases;
}

function scoreTagToLocation(tag, location) {
  const tagRaw = normalizeValue(tag);
  const tagKey = alnum(tagRaw);
  if (!tagKey) return 0;

  const aliases = buildLocationAliases(location.name);
  let best = 0;
  aliases.forEach(alias => {
    const aliasKey = alnum(alias);
    if (!aliasKey) return;
    if (tagKey === aliasKey) best = Math.max(best, 120);
    else if (aliasKey.startsWith(tagKey) || tagKey.startsWith(aliasKey)) best = Math.max(best, 80);
    else if (aliasKey.includes(tagKey) || tagKey.includes(aliasKey)) best = Math.max(best, 60);
  });

  const tagSkeleton = consonantSkeleton(tagRaw);
  const nameSkeleton = consonantSkeleton(location.name);
  if (tagSkeleton && nameSkeleton) {
    if (tagSkeleton === nameSkeleton) best = Math.max(best, 110);
    else if (nameSkeleton.startsWith(tagSkeleton) || tagSkeleton.startsWith(nameSkeleton)) best = Math.max(best, 75);
  }

  const tagNums = extractNumberTokens(tagRaw).join("|");
  const locNums = extractNumberTokens(location.name).join("|");
  if (tagNums && tagNums === locNums) best += 15;

  return best;
}

    "PRLV": "Pearl Valley",
    "PTR": "Patricia",
    "PWL9 1.5T": "Powell 9 1.5T",
    "PWL9 ULTRA": "Powell 9 Ultra",
    "QR": "Queen Robyn",
    "RC2": "Ragin Cajun 2",
    "RC4": "Ragin Cajun 4",
    "RGL1": "Rhaegal 1",
    "RGL2": "Rhaegal 2",
    "SLT1": "Scarlet 1",
    "SLT2": "Scarlet 2",
    "SPYGLASS": "Spyglass",
    "STRK": "Stork",
    "TKA1": "Tatanka 1",
    "TKA2": "Tatanka 2",
    "TLC": "Talco",
    "TRST": "Tree State",
    "WJ": "Widow Jane",
    "YDA": "Yada",
  };

  const tagToLocation = { ...BUILTIN_TAG_TO_LOCATION, ...userTagToLocation };

  ASSETS.forEach(asset => {
    const directIds = [
      asset.locationId,
      asset.location_id,
      asset.locId,
      asset.locID,
      asset.lid,
    ].map(v => String(v || "")).filter(Boolean);

    let matched = false;
    for (const id of directIds) {
      const loc = locById.get(id);
      if (!loc) continue;
      index.get(String(loc.id)).push(asset);
      matched = true;
    }
    if (matched) return;

    const directNames = [
      asset.locationName,
      asset.location,
      asset.locTag,
      asset.locationTag,
      asset.tag,
      asset.site,
      asset.loc,
    ].map(normalizeValue).filter(Boolean);
    for (const name of directNames) {
      const loc = locByName.get(name);
      if (!loc) continue;
      index.get(String(loc.id)).push(asset);
      matched = true;
    }
    if (matched) return;

    const rawTag = String(asset.locTag || asset.locationTag || asset.tag || asset.t || "").trim();
    if (!rawTag) return;

    const manualLocName = tagToLocation[rawTag.toUpperCase()];
    if (manualLocName && locByName.has(normalizeValue(manualLocName))) {
      const manualLoc = locByName.get(normalizeValue(manualLocName));
      index.get(String(manualLoc.id)).push(asset);
      return;
    }

    let bestLoc = null;
    let bestScore = 0;
    for (const loc of LOCATIONS) {
      const score = scoreTagToLocation(rawTag, loc);
      if (score > bestScore) {
        bestScore = score;
        bestLoc = loc;
      }
    }
    if (bestLoc && bestScore >= 85) {
      index.get(String(bestLoc.id)).push(asset);
    }
  });

  const locationToTags = LOCATION_ASSET_LOOKUP.locationToTags || {};
  const pushIfMissing = (locId, asset) => {
    const list = index.get(String(locId));
    if (!list) return;
    const id = String(asset.id);
    if (list.some(a => String(a.id) === id)) return;
    list.push(asset);
  };
  Object.keys(locationToTags).forEach(key => {
    const loc = locById.get(String(key).trim()) || locByName.get(normalizeValue(String(key).trim()));
    if (!loc) {
      console.warn("LOCATION_ASSET_LOOKUP.locationToTags: unknown location key", key);
      return;
    }
    const tagList = locationToTags[key];
    if (!Array.isArray(tagList)) return;
    tagList.forEach(entry => {
      const want = String(entry).trim();
      if (!want) return;
      const w = want.toLowerCase();
      ASSETS.forEach(asset => {
        const t = String(asset.locTag || asset.t || "").trim();
        if (!t || t.toLowerCase() !== w) return;
        pushIfMissing(String(loc.id), asset);
      });
    });
  });

  LOCATION_ASSET_INDEX = index;
}

function isAssetInLocation(asset, location) {
  if (!asset || !location) return false;

  const scoped = LOCATION_ASSET_INDEX.get(String(location.id));
  if (scoped && scoped.length) {
    return scoped.some(a => String(a.id) === String(asset.id));
  }

  const locId = String(location.id || "");
  const locName = normalizeValue(location.name);

  const directIds = [
    asset.locationId,
    asset.location_id,
    asset.locId,
    asset.locID,
    asset.lid,
  ].map(v => String(v || ""));

  if (locId && directIds.some(id => id && id === locId)) return true;

  const tags = [
    asset.locTag,
    asset.locationTag,
    asset.tag,
    asset.locationName,
    asset.location,
    asset.site,
    asset.loc,
  ].map(normalizeValue).filter(Boolean);

  if (locName && tags.some(tag => tag === locName)) return true;
  if (locName && tags.some(tag => tag.includes(locName) || locName.includes(tag))) return true;

  return false;
}

function getAssetsForSelectedLocation() {
  if (!state.selectedLoc) return [];
  const scoped = LOCATION_ASSET_INDEX.get(String(state.selectedLoc.id));
  if (scoped && scoped.length) return scoped;
  const fallbackAssets = getRelatedLocationAssets(state.selectedLoc);
  if (fallbackAssets.length) return fallbackAssets;
  return ASSETS.filter(asset => isAssetInLocation(asset, state.selectedLoc));
}

function getRelatedLocationAssets(location) {
  const name = String(location?.name || "").trim();
  if (!name) return [];

  const fallbackGroups = {
    "CNX | Widow Jane": ["Widow Jane"],
    "CNX | Talco": ["Talco"],
    "CNX | Greenlight": ["Greenlight 1", "Greenlight 2"],
    "CNX | Bridgestate": ["Bridgestate"],
    "CNX | Powell": ["Powell 9 1.5T", "Powell 9 Ultra"],
    "OWH - Muskie 5": ["Muskie 5"],
  };

  const candidates = new Set();
  (fallbackGroups[name] || []).forEach(n => candidates.add(normalizeValue(n)));

  if (!candidates.size) {
    if (name.includes("|")) candidates.add(normalizeValue(name.split("|").pop()));
    if (name.includes("-")) candidates.add(normalizeValue(name.split("-").pop()));
  }

  if (!candidates.size) return [];

  const byName = new Map(LOCATIONS.map(l => [normalizeValue(l.name), l]));
  const collected = [];
  const seen = new Set();
  candidates.forEach(candidate => {
    const exact = byName.get(candidate);
    if (exact) {
      const assets = LOCATION_ASSET_INDEX.get(String(exact.id)) || [];
      assets.forEach(a => {
        const key = String(a.id);
        if (!seen.has(key)) {
          seen.add(key);
          collected.push(a);
        }
      });
      return;
    }

    LOCATIONS.forEach(loc => {
      const locName = normalizeValue(loc.name);
      if (!locName.startsWith(candidate)) return;
      const assets = LOCATION_ASSET_INDEX.get(String(loc.id)) || [];
      assets.forEach(a => {
        const key = String(a.id);
        if (!seen.has(key)) {
          seen.add(key);
          collected.push(a);
        }
      });
    });
  });

  return collected;
}

function searchAssetsForLocation(query) {
  const scopedAssets = getAssetsForSelectedLocation();
  if (!query || query.trim().length < 1) return scopedAssets.slice(0, 12);
  return fuzzySearch(query, scopedAssets);
}

function renderDropdown(containerId, items, onSelect) {
  const dd = document.getElementById(containerId);
  dd.innerHTML = "";
  if (items.length === 0) { dd.classList.remove("open"); return; }

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    let html = `<span class="name">${escHtml(item.name)}</span>`;
    if (item.locTag) html += `<span class="tag">${escHtml(item.locTag)}</span>`;
    div.innerHTML = html;
    div.addEventListener("mousedown", (e) => {
      e.preventDefault();
      onSelect(item);
      dd.classList.remove("open");
    });
    dd.appendChild(div);
  });
  dd.classList.add("open");
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function setupEventListeners() {
  const inpName = document.getElementById("inp-name");
  const inpLoc = document.getElementById("inp-loc");
  const inpAsset = document.getElementById("inp-asset");
  const inpDesc = document.getElementById("inp-desc");
  const locClear = document.getElementById("loc-clear");
  const assetClear = document.getElementById("asset-clear");

  ["name-wrap","loc-wrap","asset-wrap","desc-wrap"].forEach(id => {
    const wrap = document.getElementById(id);
    const inp = wrap.querySelector("input,textarea");
    if (!inp) return;
    inp.addEventListener("focus", () => wrap.classList.add("focused"));
    inp.addEventListener("blur", () => wrap.classList.remove("focused"));
  });

  inpLoc.addEventListener("input", () => {
    const q = inpLoc.value;
    locClear.style.display = q ? "flex" : "none";
    const results = fuzzySearch(q, LOCATIONS);
    renderDropdown("loc-dropdown", results, selectLocation);
  });
  inpLoc.addEventListener("focus", () => {
    if (inpLoc.value) {
      const results = fuzzySearch(inpLoc.value, LOCATIONS);
      renderDropdown("loc-dropdown", results, selectLocation);
    }
  });
  inpLoc.addEventListener("blur", () => {
    setTimeout(() => document.getElementById("loc-dropdown").classList.remove("open"), 150);
  });
  locClear.addEventListener("click", () => {
    inpLoc.value = "";
    locClear.style.display = "none";
    state.selectedLoc = null;
    clearAsset();
    updateSummary();
    updateSubmitBtn();
  });

  inpAsset.addEventListener("input", () => {
    if (!state.selectedLoc) return;
    const q = inpAsset.value;
    assetClear.style.display = q ? "flex" : "none";
    const results = searchAssetsForLocation(q);
    renderDropdown("asset-dropdown", results, selectAsset);
  });
  inpAsset.addEventListener("focus", () => {
    if (!state.selectedLoc) return;
    const results = searchAssetsForLocation(inpAsset.value);
    renderDropdown("asset-dropdown", results, selectAsset);
  });
  inpAsset.addEventListener("blur", () => {
    setTimeout(() => document.getElementById("asset-dropdown").classList.remove("open"), 150);
  });
  assetClear.addEventListener("click", () => {
    clearAsset();
    updateSummary();
    updateSubmitBtn();
  });

  document.getElementById("priority-bar").addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    state.priority = btn.dataset.p;
    updatePriorityUI();
  });
  updatePriorityUI();

  inpDesc.addEventListener("input", updateSubmitBtn);
  inpName.addEventListener("input", updateSubmitBtn);

  const uploadZone = document.getElementById("upload-zone");
  uploadZone.addEventListener("click", () => {
    document.getElementById("file-input").click();
  });
  uploadZone.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      document.getElementById("file-input").click();
    }
  });
  document.getElementById("file-input").addEventListener("change", handleFileSelect);

  document.getElementById("submit-btn").addEventListener("click", handleSubmit);

  document.addEventListener("click", (e) => {
    if (!document.getElementById("loc-field").contains(e.target))
      document.getElementById("loc-dropdown").classList.remove("open");
    if (!document.getElementById("asset-field").contains(e.target))
      document.getElementById("asset-dropdown").classList.remove("open");
  });
}

function selectLocation(loc) {
  state.selectedLoc = loc;
  document.getElementById("inp-loc").value = loc.name;
  document.getElementById("loc-clear").style.display = "flex";

  const assetWrap = document.getElementById("asset-wrap");
  assetWrap.classList.remove("disabled");
  const inpAsset = document.getElementById("inp-asset");
  inpAsset.disabled = false;
  const scopedAssets = getAssetsForSelectedLocation();
  inpAsset.placeholder = scopedAssets.length
    ? "Search assets for this site"
    : "No assets match this site yet";
  inpAsset.value = "";
  state.selectedAsset = null;
  document.getElementById("asset-clear").style.display = "none";
  document.getElementById("asset-dropdown").classList.remove("open");

  updateSummary();
  updateSubmitBtn();
  inpAsset.focus();
}

function selectAsset(asset) {
  state.selectedAsset = asset;
  document.getElementById("inp-asset").value = asset.name;
  document.getElementById("asset-clear").style.display = "flex";
  updateSummary();
  updateSubmitBtn();
}

function clearAsset() {
  state.selectedAsset = null;
  const inp = document.getElementById("inp-asset");
  inp.value = "";
  document.getElementById("asset-clear").style.display = "none";
  if (!state.selectedLoc) {
    document.getElementById("asset-wrap").classList.add("disabled");
    inp.disabled = true;
    inp.placeholder = "Choose a location first";
  }
}

function updatePriorityUI() {
  const btns = document.querySelectorAll("#priority-bar button");
  btns.forEach(btn => {
    const isActive = btn.dataset.p === state.priority;
    const c = btn.dataset.c;
    btn.style.borderColor = isActive ? c : "rgba(255, 255, 255, 0.1)";
    btn.style.background = isActive ? c + "1a" : "rgba(0, 0, 0, 0.2)";
    btn.style.color = isActive ? c : "var(--muted)";
  });
}

function updateSummary() {
  const el = document.getElementById("summary");
  const content = document.getElementById("summary-content");
  if (!state.selectedLoc && !state.selectedAsset) {
    el.style.display = "none";
    return;
  }
  el.style.display = "block";
  let html = "";
  if (state.selectedLoc) html += `<div><span class="slbl">Location</span> <strong>${escHtml(state.selectedLoc.name)}</strong></div>`;
  if (state.selectedAsset) {
    html += `<div><span class="slbl">Asset</span> <strong>${escHtml(state.selectedAsset.name)}</strong>`;
    if (state.selectedAsset.locTag) html += `<span class="tag-b">${escHtml(state.selectedAsset.locTag)}</span>`;
    html += `</div>`;
  }
  if (state.images.length > 0) {
    const n = state.images.length;
    const word = n === 1 ? "image" : "images";
    html += `<div><span class="slbl">Photos</span> ${n} ${word}</div>`;
  }
  content.innerHTML = html;
}

function updateSubmitBtn() {
  const btn = document.getElementById("submit-btn");
  const name = document.getElementById("inp-name").value.trim();
  const desc = document.getElementById("inp-desc").value.trim();
  const valid = state.selectedLoc && state.selectedAsset && desc.length >= 5 && name.length > 0 && !state.submitting;
  btn.disabled = !valid;
  btn.className = "submit-btn " + (valid ? "active" : "inactive");
}

function handleFileSelect(e) {
  const files = Array.from(e.target.files || []);
  files.forEach(file => {
    if (!file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      state.images.push({ name: file.name, type: file.type, data: ev.target.result });
      renderImagePreviews();
      updateSummary();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = "";
}

function renderImagePreviews() {
  const container = document.getElementById("upload-preview");
  container.innerHTML = "";
  state.images.forEach((img, i) => {
    const div = document.createElement("div");
    div.className = "upload-thumb";
    div.innerHTML = `<img src="${img.data}" alt=""><button class="rm" data-idx="${i}">x</button>`;
    div.querySelector(".rm").addEventListener("click", (e) => {
      e.stopPropagation();
      state.images.splice(i, 1);
      renderImagePreviews();
      updateSummary();
    });
    container.appendChild(div);
  });
}

async function handleSubmit() {
  if (state.submitting) return;
  state.submitting = true;
  const btn = document.getElementById("submit-btn");
  btn.textContent = "Sending…";
  updateSubmitBtn();
  showStatus("submitting", "Sending…");

  const payload = {
    locationId: state.selectedLoc.id,
    locationName: state.selectedLoc.name,
    assetId: state.selectedAsset.id,
    assetName: state.selectedAsset.name,
    description: document.getElementById("inp-desc").value.trim(),
    priority: state.priority,
    submittedBy: document.getElementById("inp-name").value.trim(),
    sourceType: "webform",
    action: "createWorkOrder",
    attachments: state.images.map(img => ({ name: img.name, type: img.type, data: img.data })),
  };

  try {
    const res = await fetch(CONFIG.webhookUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    state.submitting = false;
    btn.textContent = "Submit";

    if (data.status === "duplicate_found") {
      showStatus("duplicate", `There’s already an open work order #${data.existingWoId || "?"}.`);
    } else if (data.workOrderId || res.ok) {
      showStatus("success", `Work order #${data.workOrderId || "OK"} is in.`);
    } else {
      showStatus("error", "We couldn’t post that. Check the integration or try again.");
    }
  } catch (err) {
    state.submitting = false;
    btn.textContent = "Submit";
    showStatus("error", "You’re offline or the request didn’t go through. Try again.");
  }
  updateSubmitBtn();
}

function showStatus(type, text) {
  const bar = document.getElementById("status-bar");
  const colors = {
    submitting: { bg: "rgba(0,0,0,0.2)", c: "var(--muted)" },
    success: { bg: "rgba(125, 158, 134, 0.12)", c: "var(--ok)" },
    error: { bg: "rgba(193, 122, 106, 0.12)", c: "var(--err)" },
    duplicate: { bg: "rgba(184, 154, 92, 0.14)", c: "var(--warn)" },
  };
  const col = colors[type] || colors.error;
  let html = `<div class="status-bar" style="background:${col.bg}">`;
  html += `<span style="color:${col.c};font-size:0.84rem;font-weight:500;letter-spacing:0.01em;">${escHtml(text)}</span>`;
  if (type !== "submitting") {
    const label = type === "success" ? "Another" : "Try again";
    html += `<button type="button" class="btn" style="color:${col.c}" onclick="resetForm()">${escHtml(label)}</button>`;
  }
  html += `</div>`;
  bar.innerHTML = html;
}

function resetForm() {
  document.getElementById("inp-name").value = "";
  document.getElementById("inp-loc").value = "";
  document.getElementById("inp-asset").value = "";
  document.getElementById("inp-desc").value = "";
  document.getElementById("loc-clear").style.display = "none";
  document.getElementById("asset-clear").style.display = "none";
  document.getElementById("status-bar").innerHTML = "";
  state.selectedLoc = null;
  state.selectedAsset = null;
  state.priority = "MEDIUM";
  state.images = [];
  state.submitting = false;
  clearAsset();
  const submitBtn = document.getElementById("submit-btn");
  submitBtn.textContent = "Submit";
  updatePriorityUI();
  updateSummary();
  updateSubmitBtn();
  renderImagePreviews();
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
